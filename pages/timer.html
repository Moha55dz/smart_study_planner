<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Timer - Smart Study Planner</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Stylesheets -->
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        .timer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
            text-align: center;
        }

        .timer-display {
            font-size: 8rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            margin: 2rem 0;
            color: var(--primary);
            text-shadow: 0 4px 24px rgba(108, 99, 255, 0.15);
        }

        .timer-modes {
            display: flex;
            gap: 1rem;
            background: var(--secondary);
            padding: 0.5rem;
            border-radius: 100px;
            margin-bottom: 1rem;
        }

        .mode-btn {
            padding: 0.5rem 1.5rem;
            border-radius: 100px;
            border: none;
            background: transparent;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
        }

        .mode-btn.active {
            background: var(--card);
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .timer-controls {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .btn-circle {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .session-info {
            margin-top: 3rem;
            padding: 1rem 2rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }
    </style>
</head>
<body data-theme="light">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">
            <i class="fas fa-graduation-cap"></i>
            <span>StudyPlanner</span>
        </div>
        <nav class="nav-links">
            <div class="nav-item">
                <a href="../index.html" class="nav-link">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="subjects.html" class="nav-link">
                    <i class="fas fa-book"></i>
                    <span>Subjects</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="planner.html" class="nav-link">
                    <i class="fas fa-calendar-alt"></i>
                    <span>Planner</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="timer.html" class="nav-link active">
                    <i class="fas fa-stopwatch"></i>
                    <span>Timer</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="progress.html" class="nav-link">
                    <i class="fas fa-chart-line"></i>
                    <span>Progress</span>
                </a>
            </div>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="header">
            <div class="greeting">
                <h1>Focus Timer</h1>
                <p style="color: var(--text-muted);">Master your time with the Pomodoro technique.</p>
            </div>
            <div style="display: flex; align-items: center; gap: 1rem;">
                 <select id="timer-subject" style="padding: 0.5rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--card); color: var(--text-main);">
                    <option value="">Select Subject</option>
                 </select>
            </div>
        </header>

        <div class="timer-container">
            <div class="timer-modes">
                <button class="mode-btn active" data-time="25">Pomodoro</button>
                <button class="mode-btn" data-time="5">Short Break</button>
                <button class="mode-btn" data-time="15">Long Break</button>
            </div>

            <div class="timer-display" id="display">25:00</div>

            <div class="timer-controls">
                <button class="btn btn-outline btn-circle" id="reset-btn" title="Reset">
                    <i class="fas fa-redo-alt"></i>
                </button>
                <button class="btn btn-primary btn-circle" id="start-btn" style="width: 80px; height: 80px; font-size: 2rem;">
                    <i class="fas fa-play"></i>
                </button>
                <button class="btn btn-outline btn-circle" id="settings-btn" title="Settings">
                    <i class="fas fa-cog"></i>
                </button>
            </div>

            <div class="session-info">
                <p id="session-count">Sessions completed today: 0</p>
            </div>
        </div>

        <!-- Timer Settings Modal -->
        <div id="settings-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center;">
            <div class="card" style="width: 100%; max-width: 400px; margin: 1rem;">
                <h3 style="margin-bottom: 1.5rem;">Timer Settings (Minutes)</h3>
                
                <div style="display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem; text-align: left;">
                    <div>
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem;">Pomodoro</label>
                        <input type="number" id="pref-pomo" value="25" min="1" max="60" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text-main);">
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem;">Short Break</label>
                        <input type="number" id="pref-short" value="5" min="1" max="30" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text-main);">
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem;">Long Break</label>
                        <input type="number" id="pref-long" value="15" min="1" max="60" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text-main);">
                    </div>
                </div>

                <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                    <button class="btn btn-outline" id="close-settings">Cancel</button>
                    <button class="btn btn-primary" id="save-settings">Save Settings</button>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/storage.js"></script>
    <script src="../js/timer.js"></script>
</body>
</html>
