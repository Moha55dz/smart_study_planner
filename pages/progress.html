<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Tracking - Smart Study Planner</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Stylesheets -->
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body data-theme="light">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">
            <i class="fas fa-graduation-cap"></i>
            <span>StudyPlanner</span>
        </div>
        <nav class="nav-links">
            <div class="nav-item">
                <a href="../index.html" class="nav-link">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="subjects.html" class="nav-link">
                    <i class="fas fa-book"></i>
                    <span>Subjects</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="planner.html" class="nav-link">
                    <i class="fas fa-calendar-alt"></i>
                    <span>Planner</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="timer.html" class="nav-link">
                    <i class="fas fa-stopwatch"></i>
                    <span>Timer</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="progress.html" class="nav-link active">
                    <i class="fas fa-chart-line"></i>
                    <span>Progress</span>
                </a>
            </div>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="header">
            <div class="greeting">
                <h1>Progress Tracking</h1>
                <p style="color: var(--text-muted);">Visualize your effort and stay motivated.</p>
            </div>
        </header>

        <div class="grid grid-2">
             <div class="card" style="grid-column: 1 / -1;">
                <h2 style="margin-bottom: 2rem; font-size: 1.25rem;">Study Hours (Last 7 Days)</h2>
                <div style="width: 100%; height: 350px; position: relative;">
                    <canvas id="progressChart"></canvas>
                </div>
            </div>

            <div class="card">
                <h3 style="margin-bottom: 1rem;">Top Subjects</h3>
                <div id="top-subjects-list" style="display: flex; flex-direction: column; gap: 1rem;">
                    <!-- Injected by JS -->
                </div>
            </div>

            <div class="card">
                <h3 style="margin-bottom: 1rem;">Total Stats</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div style="padding: 1rem; background: var(--secondary); border-radius: var(--radius); text-align: center;">
                        <div style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.25rem;">Total Hours</div>
                        <div style="font-size: 1.5rem; font-weight: 700;" id="total-hours">0h</div>
                    </div>
                    <div style="padding: 1rem; background: var(--secondary); border-radius: var(--radius); text-align: center;">
                        <div style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.25rem;">Sessions</div>
                        <div style="font-size: 1.5rem; font-weight: 700;" id="total-sessions">0</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/storage.js"></script>
    <script src="../js/charts.js"></script>
</body>
</html>
