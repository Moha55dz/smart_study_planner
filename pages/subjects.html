<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subjects — Smart Study Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Tajawal:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body data-page-title-key="docTitleSubjects">
    <div class="sidebar-backdrop" id="sidebar-backdrop" aria-hidden="true"></div>

    <div class="app-shell">
        <aside class="sidebar" id="app-sidebar" data-i18n-aria="ariaMainNav" aria-label="Main navigation">
            <div class="sidebar__brand">
                <div class="sidebar__brand-icon" aria-hidden="true"><i class="fas fa-graduation-cap"></i></div>
                <div class="sidebar__brand-text">
                    <span class="sidebar__title" data-i18n="brandTitle">Smart Study</span>
                    <span class="sidebar__subtitle" data-i18n="brandSubtitle">Planner</span>
                </div>
            </div>
            <nav class="nav-links">
                <div class="nav-item"><a href="../index.html" class="nav-link"><i class="fas fa-th-large"></i><span data-i18n="navDashboard">Dashboard</span></a></div>
                <div class="nav-item"><a href="tasks.html" class="nav-link"><i class="fas fa-clipboard-list"></i><span data-i18n="navTasks">Tasks</span></a></div>
                <div class="nav-item"><a href="subjects.html" class="nav-link active"><i class="fas fa-book"></i><span data-i18n="navSubjects">Subjects</span></a></div>
                <div class="nav-item"><a href="planner.html" class="nav-link"><i class="fas fa-calendar-days"></i><span data-i18n="navPlanner">Planner</span></a></div>
                <div class="nav-item"><a href="timer.html" class="nav-link"><i class="fas fa-stopwatch"></i><span data-i18n="navTimer">Timer</span></a></div>
                <div class="nav-item"><a href="progress.html" class="nav-link"><i class="fas fa-chart-line"></i><span data-i18n="navProgress">Progress</span></a></div>
            </nav>
            <div class="sidebar__footer" data-i18n="sidebarFooterSubjects">Color-code your courses.</div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="topbar__left">
                    <button type="button" class="topbar__menu" id="sidebar-open" data-i18n-aria="openMenu" aria-label="Open menu"><i class="fas fa-bars"></i></button>
                    <div>
                        <div class="topbar__page-title" data-i18n="topbarSubjects">Subjects</div>
                        <div class="topbar__page-desc" data-i18n="descSubjects">Tags for planner and timer.</div>
                    </div>
                </div>
                <div class="topbar__right">
                    <div class="lang-switcher" data-i18n-aria="ariaLanguageSwitcher" role="group">
                        <button type="button" class="lang-switcher__btn" data-lang="en" aria-pressed="true">EN</button>
                        <button type="button" class="lang-switcher__btn" data-lang="ar" aria-pressed="false">عربي</button>
                    </div>
                    <div class="notifications-wrap">
                        <button type="button" class="notifications-btn" id="notifications-toggle" data-i18n-aria="ariaNotifications" aria-label="Notifications">
                            <i class="fas fa-bell"></i>
                            <span class="notifications-badge" id="notifications-badge" data-count="0"></span>
                        </button>
                        <div class="notifications-panel" id="notifications-panel" data-i18n-aria="ariaNotificationsList" aria-label="Notifications list">
                            <div class="notifications-panel__head">
                                <span data-i18n="notifications">Notifications</span>
                                <button type="button" class="btn btn-ghost btn-sm" id="notifications-mark-read" data-i18n="markAllRead">Mark all read</button>
                            </div>
                            <div class="notifications-panel__list" id="notifications-list"></div>
                        </div>
                    </div>
                    <button type="button" class="theme-toggle" data-i18n-title="ariaToggleTheme" title="Toggle theme"><i class="fas fa-moon"></i></button>
                    <div class="user-chip">
                        <div class="user-avatar" aria-hidden="true">S</div>
                        <div class="user-meta">
                            <span class="user-meta__name" data-i18n="userName">Student</span>
                            <span class="user-meta__role" data-i18n="userRole">Learner</span>
                        </div>
                    </div>
                </div>
            </header>

            <div class="page-body page-body--narrow">
                <header class="page-header" style="display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:1rem;">
                    <div>
                        <h1 data-i18n="pageSubjectsH1">My subjects</h1>
                        <p data-i18n="pageSubjectsDesc">Group work by course for scheduling and analytics.</p>
                    </div>
                    <button type="button" class="btn btn-primary" id="open-modal-btn"><i class="fas fa-plus"></i> <span data-i18n="addSubject">Add subject</span></button>
                </header>

                <div class="grid grid-3" id="subjects-grid"></div>
            </div>
        </main>
    </div>

    <div id="subject-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="subject-modal-title">
        <div class="card modal-card">
            <h2 id="subject-modal-title" style="margin-bottom:1.25rem;font-size:1.15rem;" data-i18n="addSubjectModalTitle">Add subject</h2>
            <form id="subject-form">
                <div class="form-row">
                    <label class="form-label" for="subject-name" data-i18n="subjectNameLabel">Subject name</label>
                    <input type="text" id="subject-name" class="input-field" required data-i18n-placeholder="subjectNamePlaceholder" placeholder="e.g. Linear algebra" style="width:100%;">
                </div>
                <div class="form-row">
                    <span class="form-label" data-i18n="colorTag">Color tag</span>
                    <div class="color-picker">
                        <input type="radio" name="color" value="#6366f1" checked id="c1">
                        <label for="c1" style="background:#6366f1;"></label>
                        <input type="radio" name="color" value="#10b981" id="c2">
                        <label for="c2" style="background:#10b981;"></label>
                        <input type="radio" name="color" value="#f59e0b" id="c3">
                        <label for="c3" style="background:#f59e0b;"></label>
                        <input type="radio" name="color" value="#ef4444" id="c4">
                        <label for="c4" style="background:#ef4444;"></label>
                        <input type="radio" name="color" value="#ec4899" id="c5">
                        <label for="c5" style="background:#ec4899;"></label>
                    </div>
                </div>
                <div style="display:flex;gap:0.75rem;justify-content:flex-end;margin-top:1.5rem;">
                    <button type="button" class="btn btn-outline" id="close-modal-btn" data-i18n="cancel">Cancel</button>
                    <button type="submit" class="btn btn-primary" data-i18n="saveSubject">Save subject</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/storage.js"></script>
    <script src="../js/i18n.js"></script>
    <script src="../js/ui.js"></script>
    <script>
        function tr(key, vars) {
            return typeof window.t === "function" ? window.t(key, vars) : key;
        }

        function escapeHtml(s) {
            const d = document.createElement("div");
            d.textContent = s;
            return d.innerHTML;
        }

        document.addEventListener("DOMContentLoaded", () => {
            const grid = document.getElementById("subjects-grid");
            const modal = document.getElementById("subject-modal");
            const form = document.getElementById("subject-form");

            function openModal() {
                modal.classList.add("is-open");
                document.getElementById("subject-name").focus();
            }
            function closeModal() {
                modal.classList.remove("is-open");
            }

            const renderSubjects = () => {
                const subjects = Storage.getSubjects();
                if (subjects.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state" style="grid-column:1/-1;">
                            <div class="empty-state__icon"><i class="fas fa-book-open"></i></div>
                            <h3>${escapeHtml(tr("subjectsEmptyTitle"))}</h3>
                            <p>${escapeHtml(tr("subjectsEmptyDesc"))}</p>
                            <button type="button" class="btn btn-primary btn-sm" id="empty-add-subject">${escapeHtml(tr("addSubject"))}</button>
                        </div>`;
                    document.getElementById("empty-add-subject").onclick = openModal;
                    return;
                }
                grid.innerHTML = subjects
                    .map(
                        (s) => `
                    <div class="card card--flat" style="border-inline-start:5px solid ${s.color};">
                        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:0.75rem;margin-bottom:0.75rem;">
                            <h3 style="font-weight:700;font-size:1.05rem;">${escapeHtml(s.name)}</h3>
                            <button type="button" class="btn btn-ghost btn-sm" onclick="deleteSub(${s.id})" aria-label="${escapeHtml(tr("delete"))}"><i class="fas fa-trash-can" style="color:var(--danger);"></i></button>
                        </div>
                        <span class="badge" style="background:${s.color}18;color:${s.color};border:1px solid ${s.color}35;">${escapeHtml(tr("subjectActive"))}</span>
                    </div>`
                    )
                    .join("");
            };

            window.deleteSub = async (id) => {
                const ok = await SSP.showConfirm({
                    title: tr("deleteSubjectTitle"),
                    message: tr("deleteSubjectMsg"),
                    confirmText: tr("delete"),
                    cancelText: tr("cancel"),
                });
                if (!ok) return;
                Storage.deleteSubject(id);
                SSP.showToast("success", tr("toastSubjectRemoved"), "");
                renderSubjects();
            };

            document.getElementById("open-modal-btn").onclick = openModal;
            document.getElementById("close-modal-btn").onclick = closeModal;

            modal.addEventListener("click", (e) => {
                if (e.target === modal) closeModal();
            });

            form.onsubmit = (e) => {
                e.preventDefault();
                const name = document.getElementById("subject-name").value.trim();
                const color = document.querySelector('input[name="color"]:checked').value;
                Storage.addSubject({ name, color });
                form.reset();
                closeModal();
                SSP.showToast("success", tr("toastSubjectSaved"), name);
                SSP.addNotification(tr("notifSubjectAdded", { name }), "fa-book");
                renderSubjects();
            };

            document.querySelectorAll('input[name="color"]').forEach((radio) => {
                radio.addEventListener("change", (e) => {
                    document.querySelectorAll('input[name="color"] + label').forEach((l) => (l.style.borderColor = "transparent"));
                    e.target.nextElementSibling.style.borderColor = "var(--text-main)";
                });
            });

            renderSubjects();

            document.addEventListener("ssp-lang-change", renderSubjects);
        });
    </script>
</body>
</html>
